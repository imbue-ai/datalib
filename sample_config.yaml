# ~/.config/frankweiler/config.yaml -- or anywhere you look.
data_root: ~/mixed_up_files  # Where the downloaded data gets written.

dolt:
  port: 3306

sources:
  - name: anthropic-api
    type: claude_api
    sync: {}
      # refresh_most_recent_n_chat_count: 3   # force-refetch top-N by updated_at
      # refresh_window_days: 7   # treat anything older than this as cold

  - name: slack
    type: slack_api
    sync:
      media: true
      channels:
        - "project-data-liberation"

  - name: perseus              # Classical texts: TEI from PerseusDL.
    type: perseus
    sync: {}                   # defaults to Thucydides Histories
                               # (Greek + English). Override with:
                               # files:
                               #   - tlg0003/tlg001/tlg0003.tlg001.perseus-grc2.xml
                               #   - tlg0003/tlg001/tlg0003.tlg001.1st1K-eng1.xml
