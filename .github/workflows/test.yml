# Runs `bazel test //...` inside the published devcontainer image with
# BuildBuddy as the action cache. Gates merges on PRs and warms the
# BuildBuddy cache on main pushes.
#
# Why a separate workflow (and not a step in `release.yml`): an earlier
# `bazel test //...` step lived in `release.yml` and was removed because
# the `bazel-contrib/setup-bazel` GHA disk cache kept tripping "Lost
# inputs no longer available remotely" against rules_rust's
# ExtractCargoTomlEnvVars actions â€” every release run rebuilt 1500+
# actions and the broken cache never healed. Routing the cache through
# BuildBuddy instead sidesteps the GHA-cache-shape mismatch entirely.
#
# Why the devcontainer image: `bazel test //...` needs the full Bazel
# build toolchain â€” clang, cmake, llvm, libclang-dev, lld, perl,
# pkg-config, libssl-dev â€” that the prod image deliberately omits. The
# devcontainer image carries that toolchain on top of the prod image's
# qmd model cache, latchkey, doltlite CLI, etc. Re-installing it via apt
# at the start of each job (the pattern `release.yml`'s build matrix
# uses) would add ~3 min of apt + cold qmd model download to every run;
# pulling the pre-built image is closer to ~30s.
#
# Bootstrap: the devcontainer image must be published to GHCR before
# this workflow can succeed. The `devcontainer-publish` job in
# `release.yml` publishes it on every `v*` tag push. On a fresh repo
# with no devcontainer image yet, push a tag first; the first PR after
# can then run this workflow.
name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: read  # to pull the devcontainer image from GHCR

# Cancel superseded PR runs â€” pushing a fixup commit shouldn't keep the
# previous run burning a runner. main pushes don't cancel so the
# BuildBuddy cache fill from every merged commit is preserved.
concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  bazel-test:
    name: bazel test //...
    runs-on: ubuntu-latest

    # GitHub Actions defaults `run:` steps to `sh` (dash) when the job
    # runs inside a container, which rejects `set -o pipefail` and `[[ ]]`.
    # Force bash so the bash-isms in the steps below work.
    defaults:
      run:
        shell: bash

    # Run the job inside the published devcontainer image. We
    # deliberately track `:latest` rather than pinning a version: the
    # image is only republished on `v*` tag pushes (by
    # `release.yml`'s `devcontainer-publish` job), so `:latest` only
    # moves on deliberate release events, not opportunistically. In
    # exchange, contributors don't have to remember to bump a pin in
    # this file after every release â€” `.devcontainer/Dockerfile`'s
    # `PROD_IMAGE_TAG` is the only remaining manual pin (and it
    # governs reproducible LOCAL devcontainer builds, which is a
    # property worth keeping).
    #
    # Risk: a broken devcontainer image published at `:latest` taints
    # every subsequent CI run until the next release. Acceptable
    # because release tagging is a deliberate human action; bad images
    # surface immediately on the next PR.
    container:
      image: ghcr.io/imbue-ai/mixed_up_files-devcontainer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6
        with:
          # `tools/workspace_status.sh` runs `git describe --tags`; the
          # default shallow clone has no tag history, so describe would
          # always fall back to a bare sha and the `--stamp` outputs
          # would churn on every run.
          fetch-depth: 0

      # Drop the BuildBuddy API key into the workspace `.bazelrc.user`
      # (gitignored) â€” `.bazelrc`'s `try-import` at the bottom picks it
      # up, and `build --config=buildbuddy` activates the remote cache
      # + BES endpoint. `test` inherits from `build`, so a single
      # `build --config=...` line covers both; adding a separate
      # `test --config=...` line on top double-expands the config and
      # trips bazel's "config expanded more than once" warning.
      #
      # If the secret isn't available (PR from a fork; manual local
      # `act` runs without secrets), the step writes nothing and bazel
      # runs without remote caching â€” actions still execute locally,
      # just without the cross-machine cache hits.
      - name: Configure BuildBuddy remote cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILD_BUDDY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
              cat > .bazelrc.user <<EOF
          common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}
          build --config=buildbuddy
          EOF
              echo "BuildBuddy remote cache enabled for this job."
          else
              echo "BUILD_BUDDY_API_KEY not available â€” running without remote cache."
          fi

      - name: Show toolchain versions
        run: |
          bazel version
          rustc --version || true

      # `-c opt --config=release` mirrors the build mode `release.yml`'s
      # dist build uses, so the BuildBuddy action cache populated here
      # on every PR / main push warms exactly the entries tag-time
      # release builds will hit (instead of fastbuild entries the
      # release path's opt-mode actions can't use). Side benefit:
      # tests run against the same binaries we ship, which catches
      # opt-mode-only behaviors before release.
      #
      # `--build_metadata=ROLE=CI` tags the invocation in the BuildBuddy
      # UI so CI runs are filterable from contributor invocations.
      # Matches the convention used by `release.yml`'s build + test
      # steps.
      #
      # This step is the merge gate: a non-zero `bazel test` exit must
      # fail the job. It previously carried `continue-on-error: true` to
      # hide a red cross while the CI-only failures were triaged â€” the
      # two known causes (precommit_test shelling out to a host `cargo`
      # the devcontainer doesn't ship, and exec-config bindgen missing
      # `--host_action_env=LIBCLANG_PATH`) are now fixed at the source,
      # so the suppression is removed and real failures gate merges
      # again.
      - name: bazel test //...
        run: bazel test //... -c opt --config=release --build_metadata=ROLE=CI
