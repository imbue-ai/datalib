# Builds the `//frankweiler/backend:dist` bins on every supported
# host platform — plus fully-static `*-unknown-linux-musl` variants
# cross-libc-compiled on the same gnu runners — and attaches a
# per-triple tarball to a GitHub Release.
# The `macos-app` job additionally builds, signs, and notarizes the
# Frankweiler desktop app and attaches its dmg to the same release.
# Triggered by pushing a `v*` tag (e.g. `git tag v0.1.0 && git push
# origin v0.1.0`). Each tarball is published with a stable,
# un-versioned filename so the install script's
# `releases/latest/download/<name>` URL stays valid.
#
# Bazel action cache is served by BuildBuddy (see the "Configure
# BuildBuddy remote cache" step below); there's no GHA-side bazel
# cache and no main-branch warmup run. Tag pushes hit BuildBuddy's
# warm cache directly — populated by every contributor build and by
# the `test.yml` workflow on main / PRs.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GitHub Release
  packages: write  # needed for the docker-publish job to push to ghcr.io

# Don't cancel in progress — tag runs publish a release and must
# complete. (No main-branch races to serialize anymore now that the
# warmup runs are gone.)
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.triple }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      # One platform failing shouldn't cancel the others: a successful
      # build's tarball can still be published to the release while we
      # investigate the broken one.
      fail-fast: false
      matrix:
        # `bazel-config`: extra config appended to the dist build only.
        # The musl legs run on the same gnu runners as their gnu
        # siblings (same arch, cross-libc): `--config=musl-*` selects
        # the `//platforms:linux_*_musl` target platform, under which
        # the hermetic musl toolchains (see MODULE.bazel) produce
        # fully-static binaries that run on any Linux regardless of
        # libc. Build scripts / proc macros / bindgen still run under
        # the host gnu toolchain, so the apt + LIBCLANG_PATH setup
        # below is identical for gnu and musl legs. The
        # version-consistency bazel test keeps running in the host
        # config on every leg (it's a shell test; no point
        # cross-compiling it) — on musl legs that costs one extra
        # ~30s analysis pass versus the gnu legs' shared-config
        # optimization described above the build steps.
        include:
          - triple: aarch64-apple-darwin
            runs-on: macos-14  # Apple Silicon
            bazel-config: ""
          - triple: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            bazel-config: ""
          - triple: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm  # GitHub-hosted native ARM Linux
            bazel-config: ""
          - triple: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            bazel-config: "--config=musl-x86_64"
          - triple: aarch64-unknown-linux-musl
            runs-on: ubuntu-24.04-arm
            bazel-config: "--config=musl-aarch64"

    steps:
      - uses: actions/checkout@v6
        with:
          # `tools/workspace_status.sh` runs `git describe --tags`; the
          # default shallow clone has no tag history, so describe would
          # always fall back to a bare sha.
          fetch-depth: 0

      # BuildBuddy serves the remote action cache (the big win — skips
      # the multi-minute boring-sys2 / tokio / wreq compiles), but
      # BuildBuddy is action-cache-only: it doesn't cover the
      # bazelisk binary download, the `http_archive` tarball downloads
      # (rules_rust source, protobuf, etc.), or crate_universe's
      # external-repo resolution. Those are local-to-runner concerns.
      #
      # We keep `repository-cache` on so the crate_universe + rules
      # tarballs persist across runs (saves the ~1–3 min network-bound
      # fetch on a cold runner). The other three layers stay off:
      #   * disk-cache duplicates BuildBuddy's action cache and
      #     previously caused "Lost inputs no longer available
      #     remotely" failures against rules_rust's
      #     ExtractCargoTomlEnvVars actions (see test.yml header).
      #   * external-cache caches the materialized `external/`
      #     workspaces — small win and historically the flakiest layer.
      #   * bazelisk-cache saves a ~20s binary download, not worth
      #     a slot in the 10 GB-per-repo actions/cache quota.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: false
          disk-cache: false
          repository-cache: true
          external-cache: false

      # Install the Linux-only build dependencies the macOS runner gets
      # for free via Xcode CLT / Homebrew:
      #   cmake        — boring-sys2's build script shells out to it
      #                  to build BoringSSL.
      #   clang        — driver binary plus llvm-config; the latter
      #                  prints the canonical libclang install dir.
      #   libclang-dev — provides the libclang.so symlink. Bindgen
      #                  (in libsqlite3-sys's build script) loads it
      #                  via clang-sys to parse <sqlite3.h>.
      #
      # NOTE: deliberately not passing `--no-install-recommends` here.
      # Ubuntu's `libclang-dev` is a transition metapackage; without
      # recommends, apt installs the empty stub and skips the
      # libclang1-NN runtime package that actually carries libclang.so
      # — which is exactly what bit us on the first attempt
      # (b4b12e4): the package "installed" but bindgen still failed
      # with "Unable to find libclang".
      #
      # Skipped on macOS; that runner already has clang via the SDK
      # and cmake via Homebrew (`brew install bazel cmake` per README).
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          # `llvm` brings in the `llvm-config` binary — clang and
          # libclang-dev DO NOT, contrary to intuition. The
          # ubuntu-24.04-arm runner happens to have llvm preinstalled
          # so the previous attempt (without `llvm` here) worked on
          # arm64; ubuntu-latest x86_64 does not, so the same step
          # silently set LIBCLANG_PATH="" and bindgen panicked
          # downstream. See run 26860782615 for the trace.
          sudo apt-get install -y \
            cmake \
            clang \
            libclang-dev \
            llvm
          # Surface libclang's directory so bindgen finds it inside
          # bazel's processwrapper-sandbox (forwarded via
          # --action_env on the bazel commands below, which override
          # .bazelrc's macOS default). Using llvm-config keeps us
          # robust to LLVM version bumps — whatever clang the runner
          # installs, we point at its actual libdir.
          lib_dir="$(llvm-config --libdir)"
          if [[ -z "$lib_dir" ]]; then
              echo "ERROR: llvm-config --libdir returned empty." >&2
              echo "PATH=$PATH" >&2
              command -v llvm-config || true
              exit 1
          fi
          echo "Resolved LIBCLANG_PATH=$lib_dir"
          echo "LIBCLANG_PATH=$lib_dir" >> "$GITHUB_ENV"

      - name: Show toolchain versions
        run: |
          bazel version
          rustc --version || true

      # Wire BuildBuddy remote cache for this build. `.bazelrc.user` is
      # gitignored so we can drop the API key into it from a repo
      # secret without polluting the source tree; the `try-import` at
      # the bottom of `.bazelrc` picks it up automatically, and the
      # `build:buildbuddy` config block does the rest.
      #
      # If the secret isn't set (e.g. a PR from a fork; manual local
      # `act` runs without secrets configured) the step writes nothing
      # and bazel runs without remote caching — actions still execute
      # locally, just without the cross-machine cache hits.
      #
      # `--remote_upload_local_results=true` is the BuildBuddy default
      # but we name it explicitly in `.bazelrc` so a future reader
      # doesn't wonder why CI's outputs land in the shared cache. For
      # CI specifically the read+write semantics are exactly what we
      # want: matrix builds populate linux-amd64 + linux-arm64 (and
      # darwin-arm64) action results that subsequent devcontainer
      # warmups + contributor builds cache-hit.
      - name: Configure BuildBuddy remote cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILD_BUDDY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
              cat > .bazelrc.user <<EOF
          common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}
          build --config=buildbuddy
          EOF
              echo "BuildBuddy remote cache enabled for this job."
          else
              echo "BUILD_BUDDY_API_KEY not available — running without remote cache."
          fi

      # Pre-create the host-side qmd model cache. .bazelrc has
      # `--sandbox_add_mount_pair=$(HOME)/.cache/qmd/models` so the
      # ingested_tng_qmd genrule can read its ~2GB GGUF cache without
      # re-downloading per action. macOS sandboxing refuses to mount a
      # nonexistent host path ("Operation not permitted (os error 1)"),
      # so create the dir up-front; harmless on Linux. Empty dir is
      # fine — qmd populates it on first run.
      - name: Ensure ~/.cache/qmd/models exists
        run: mkdir -p "$HOME/.cache/qmd/models"

      # Defense in depth against "tagged the wrong version" or "forgot
      # to bump Cargo.toml before tagging". The bazel test below already
      # asserts Cargo.toml == BUILD.bazel; this asserts tag == Cargo.toml.
      - name: Assert tag matches Cargo.toml version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${REF_NAME#v}"
          cargo_version="$(grep -E '^version = "[^"]+"$' frankweiler/backend/Cargo.toml | head -n1 | sed -E 's/^version = "([^"]+)"$/\1/')"
          if [[ "$tag_version" != "$cargo_version" ]]; then
              echo "Tag ${REF_NAME} disagrees with Cargo.toml workspace version ${cargo_version}." >&2
              echo "Bump frankweiler/backend/Cargo.toml [workspace.package].version to ${tag_version} before re-tagging." >&2
              exit 1
          fi

      # Both bazel invocations pass `-c opt` so they share the same
      # analysis cache. Mixing fastbuild + opt across consecutive
      # invocations would discard the analysis cache between them
      # ("WARNING: Build option --compilation_mode has changed,
      # discarding analysis cache"), costing ~30s of re-analysis on
      # the second invocation despite the action cache being warm.
      #
      # `BAZEL_EXTRA` carries platform-specific bazel args:
      #   * Linux — override `.bazelrc`'s macOS LIBCLANG_PATH default
      #     with the path the install step computed via llvm-config.
      #     Later flags win in bazel, so the command-line value beats
      #     the workspace .bazelrc.
      #   * macOS — empty; `.bazelrc` already points at Xcode CLT's
      #     libclang.dylib.
      - name: Compute platform-specific bazel args
        id: bazelargs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
              if [[ -z "${LIBCLANG_PATH:-}" ]]; then
                  echo "ERROR: LIBCLANG_PATH unset/empty on Linux — install step regressed." >&2
                  exit 1
              fi
              # Both target- and exec-config bindgen build scripts need
              # libclang; `--host_action_env` covers the `[for tool]`
              # copies. See the workspace .bazelrc LIBCLANG_PATH note.
              echo "extra=--action_env=LIBCLANG_PATH=${LIBCLANG_PATH} --host_action_env=LIBCLANG_PATH=${LIBCLANG_PATH}" >> "$GITHUB_OUTPUT"
          else
              echo "extra=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run version-consistency test
        run: bazel test //frankweiler/backend:version_consistency_test -c opt --build_metadata=ROLE=CI ${{ steps.bazelargs.outputs.extra }}

      # `--config=release` turns on `--stamp` so the binary's
      # `--version` reports the real `git describe` output (e.g.
      # `v0.8.0`) instead of falling back to the literal `"dev"` that
      # an unstamped build produces. The post-build version assertion
      # below catches any future regression where stamping gets
      # silently disabled.
      - name: Build dist bins
        run: bazel build //frankweiler/backend:dist -c opt --config=release --build_metadata=ROLE=CI ${{ steps.bazelargs.outputs.extra }} ${{ matrix.bazel-config }}

      # musl legs only: refuse to publish anything that isn't fully
      # static. A regression here (say, a new crate sneaking in a
      # dynamic system-library link) would otherwise ship a "musl"
      # tarball that still needs host libraries — exactly what these
      # builds exist to avoid. Fully static means no PT_INTERP program
      # header (nothing asks for a dynamic loader) and no DT_NEEDED
      # entries (no shared-library dependencies); a static-pie binary
      # keeps a DYNAMIC section for self-relocation, so `readelf -d`
      # being non-empty is fine — only NEEDED lines are disqualifying.
      - name: Assert musl binaries are fully static
        if: contains(matrix.triple, 'musl')
        run: |
          set -euo pipefail
          for bin in \
              bazel-bin/frankweiler/backend/dag/datalib_dag \
              bazel-bin/frankweiler/backend/datalib_step/datalib_step \
              bazel-bin/frankweiler/backend/http/frankweiler_http_bin \
              bazel-bin/frankweiler/backend/etl/latchkey_curl_shim; do
              echo "--- ${bin}"
              file -L "${bin}"
              if readelf -l "${bin}" | grep -q 'INTERP'; then
                  echo "ERROR: ${bin} requests a dynamic loader (PT_INTERP) — not fully static." >&2
                  exit 1
              fi
              if readelf -d "${bin}" 2>/dev/null | grep -q 'NEEDED'; then
                  echo "ERROR: ${bin} has DT_NEEDED shared-library deps — not fully static." >&2
                  readelf -d "${bin}" | grep 'NEEDED' >&2
                  exit 1
              fi
          done

      # Defense against the v0.7.0 / v0.8.0 incident where the dist
      # build went out unstamped and the version smoke test
      # printed `dev` in the published tarball. Run
      # the freshly-built binary on the host (matrix runner is the
      # same triple as the artifact) and require it to report exactly
      # the tag name. Anything else — `dev`, `unknown`, a `-dirty`
      # suffix, or a mismatched tag — fails the release before any
      # tarball is staged.
      - name: Assert release binary reports tag version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          actual="$(./bazel-bin/frankweiler/backend/dag/datalib_dag --version)"
          echo "datalib-dag --version => ${actual}"
          expected="datalib-dag ${REF_NAME}"
          if [[ "${actual}" != "${expected}" ]]; then
              echo "ERROR: release binary version mismatch." >&2
              echo "  expected: ${expected}" >&2
              echo "  actual:   ${actual}" >&2
              echo "Likely cause: build-stamping was off for the dist build" >&2
              echo "(see .bazelrc 'build:release --stamp' and the" >&2
              echo "'--config=release' on the Build dist bins step above)." >&2
              exit 1
          fi

      # The full `bazel test //...` suite is gated by `test.yml` on
      # PRs / main; this workflow only re-checks `version_consistency_test`
      # + the dist build to keep tag-time wall clock low.

      - name: Stage tarball
        id: stage
        env:
          REF_NAME: ${{ github.ref_name }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          stage="frankweiler-${version}-${TRIPLE}"
          mkdir -p "${stage}"

          # Map bazel output paths -> public installed names. Add a line
          # here when you add a binary to //frankweiler/backend:dist.
          # NOTE: `datalib-dag`/`datalib-step` keep those exact names —
          # frankweiler-http resolves them via sibling lookup (see
          # http/src/worker.rs resolve_bin) — and the shim's installed
          # name must stay in sync with `SIBLING_NAMES` in
          # frankweiler/backend/etl/src/latchkey.rs (datalib-step
          # resolves it via a sibling lookup at runtime).
          cp bazel-bin/frankweiler/backend/dag/datalib_dag "${stage}/datalib-dag"
          cp bazel-bin/frankweiler/backend/datalib_step/datalib_step "${stage}/datalib-step"
          cp bazel-bin/frankweiler/backend/http/frankweiler_http_bin "${stage}/frankweiler-http"
          cp bazel-bin/frankweiler/backend/etl/latchkey_curl_shim "${stage}/frankweiler-latchkey-curl-shim"
          chmod +x "${stage}"/*

          tarball="frankweiler-${TRIPLE}.tar.gz"
          tar -czf "${tarball}" "${stage}"
          # Linux runners have `sha256sum`; macOS has `shasum`. Use
          # whichever is available so the same step works on both.
          if command -v sha256sum >/dev/null; then
              sha256sum "${tarball}" > "${tarball}.sha256"
          else
              shasum -a 256 "${tarball}" > "${tarball}.sha256"
          fi

          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${tarball}.sha256" >> "$GITHUB_OUTPUT"

      # Plain `gh` instead of softprops/action-gh-release (an
      # individually-owned action; see the macos-app job's SUPPLY CHAIN
      # note). The matrix legs — and the macos-app job — race to create
      # the tag's release; create-if-missing with `|| true` lets the
      # losers fall through to the upload, which targets the same
      # release either way. `gh release upload` fails on a missing file,
      # preserving the old fail_on_unmatched_files behavior.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
          TARBALL: ${{ steps.stage.outputs.tarball }}
          SHA256: ${{ steps.stage.outputs.sha256 }}
        run: |
          set -euo pipefail
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
              gh release create "$REF_NAME" --verify-tag --notes "" || true
          fi
          gh release upload "$REF_NAME" --clobber "$TARBALL" "$SHA256"

  # Build, sign, and notarize the Frankweiler desktop app (Tauri) and
  # attach the dmg to the GitHub Release. Deliberately NOT gated on the
  # `build` matrix job: the tauri crate is a standalone cargo workspace
  # (not owned by bazel — see frankweiler/tauri/README.md), so a dist
  # failure shouldn't block shipping the app, and vice versa.
  #
  # The signing certs + notarization key live under
  # restricted/datalib-release/* in Vault, read via the
  # `datalib_release_gh` role (vault repo: terraform/github_actions.tf).
  # The role binds on this repository plus a glob on the OIDC ref claim
  # (refs/tags/v*), so only tag-triggered runs can mint it — branch and
  # PR workflows are denied, and no GitHub Environment setup is needed.
  # The gate is therefore "who can push a v* tag"; see the vault repo's
  # module comment for the residual exposure and how to tighten further.
  #
  # All signing/notarization mechanics live in
  # frankweiler/tauri/build-signed-app.sh, which is the same script you
  # run locally — CI only differs in where the secrets come from.
  #
  # SUPPLY CHAIN: this job holds the org's Developer ID signing key, and
  # use-vault-secrets exports it via $GITHUB_ENV — meaning every later
  # step can read it. So the job uses no individually-owned third-party
  # actions (only GitHub/pnpm/bazel-contrib org actions + our own), and
  # every step after the secrets export is plain `run:` shell — no
  # third-party action code executes with the certs in scope. Keep it
  # that way: rustup replaces dtolnay/rust-toolchain, `gh release`
  # replaces softprops/action-gh-release, and there's deliberately no
  # cargo cache (Swatinem/rust-cache) — a cold compile only costs a few
  # minutes on a rare tag build and doesn't eat the 10 GB cache quota.
  macos-app:
    name: macos-app (signed + notarized)
    runs-on: macos-14  # Apple Silicon
    timeout-minutes: 90
    permissions:
      id-token: write  # OIDC token for Vault (signing certs + notary key)
      contents: write  # attach the dmg to the GitHub Release
    env:
      VAULT_AUTH_ROLE: datalib_release_gh
    steps:
      - uses: actions/checkout@v6

      # The tauri beforeBuildCommand bazel-builds the bundled
      # frankweiler-http / datalib-dag / datalib-step binaries; same cache layering
      # rationale as the build job above (BuildBuddy serves actions,
      # repository-cache keeps the crate_universe / rules tarballs).
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: false
          disk-cache: false
          repository-cache: true
          external-cache: false

      # See the build job's identically-named step for the full story.
      - name: Configure BuildBuddy remote cache
        env:
          BUILDBUDDY_API_KEY: ${{ secrets.BUILD_BUDDY_API_KEY }}
        run: |
          set -euo pipefail
          if [[ -n "${BUILDBUDDY_API_KEY:-}" ]]; then
              cat > .bazelrc.user <<EOF
          common --remote_header=x-buildbuddy-api-key=${BUILDBUDDY_API_KEY}
          build --config=buildbuddy
          EOF
              echo "BuildBuddy remote cache enabled for this job."
          else
              echo "BUILD_BUDDY_API_KEY not available — running without remote cache."
          fi

      # .bazelrc's --sandbox_add_mount_pair needs the host path to exist;
      # see the build job's identically-named step.
      - name: Ensure ~/.cache/qmd/models exists
        run: mkdir -p "$HOME/.cache/qmd/models"

      # The tauri crate is built by cargo (not bazel's hermetic rust
      # toolchain), so make sure a current stable toolchain is default
      # instead of trusting whatever the runner image ships (Cargo.toml
      # says rust-version = "1.83"). Plain rustup, no third-party action;
      # the runner image carries rustup, with the official installer as
      # fallback in case a future image drops it.
      - name: Install Rust (stable)
        run: |
          set -euo pipefail
          if ! command -v rustup >/dev/null 2>&1; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                  | sh -s -- -y --profile minimal --default-toolchain none
              echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
              export PATH="$HOME/.cargo/bin:$PATH"
          fi
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustc --version

      # scripts/ensure_pnpm.sh bootstraps pnpm via corepack, but corepack
      # is being removed from newer Node distributions — install the
      # pinned pnpm (packageManager in frankweiler/ui/package.json)
      # directly so the runner image's Node choices can't break us.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frankweiler/ui/package.json

      - name: Export signing credentials
        # CERTS_TAR_GZ is the base64 certs tarball; APPLE_API_KEY_ID /
        # APPLE_API_ISSUER identify the notarization key inside it. The
        # action leaves all three in $GITHUB_ENV for the build step,
        # where build-signed-app.sh picks them up.
        uses: imbue-ai/use-vault-secrets@main
        with:
          role: ${{ env.VAULT_AUTH_ROLE }}
          secrets: |
            restricted/datalib-release/CERTS_TAR_GZ
            restricted/datalib-release/APPLE_API_KEY_ID
            restricted/datalib-release/APPLE_API_ISSUER

      - name: Build, sign, notarize
        # FRANKWEILER_APP_VERSION stamps the tag's version into the
        # bundle (tauri.conf.json's checked-in version is not kept in
        # sync with the backend workspace version the tag asserts on).
        # The tag goes through env, never ${{ }}-interpolated into run:
        # (see verify-version in sculptor's build-desktop.yml for why).
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export FRANKWEILER_APP_VERSION="${REF_NAME#v}"
          ./frankweiler/tauri/build-signed-app.sh

      - name: Stage dmg
        env:
          REF_NAME: ${{ github.ref_name }}
        # Same stable, un-versioned filename convention as the tarballs
        # so `releases/latest/download/<name>` URLs stay valid.
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          dmg="frankweiler/tauri/target/release/bundle/dmg/Frankweiler_${version}_aarch64.dmg"
          out="Frankweiler-aarch64-apple-darwin.dmg"
          cp "$dmg" "$out"
          shasum -a 256 "$out" > "$out.sha256"

      # Plain `gh` instead of softprops/action-gh-release: no third-party
      # action code runs after the signing secrets land in $GITHUB_ENV
      # (see the SUPPLY CHAIN note in the job comment). Create-if-missing
      # tolerates the race with the build matrix's publish step — if the
      # create loses the race, the upload still targets the same release.
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$REF_NAME" >/dev/null 2>&1; then
              gh release create "$REF_NAME" --verify-tag --notes "" || true
          fi
          gh release upload "$REF_NAME" --clobber \
              Frankweiler-aarch64-apple-darwin.dmg \
              Frankweiler-aarch64-apple-darwin.dmg.sha256

  # Build and push the multi-arch runtime image to ghcr.io. Runs after
  # the matrix `build` job has uploaded both Linux tarballs to the
  # GitHub Release so we can fetch them by their stable
  # `releases/download/<tag>/...` URLs from inside the docker build
  # context.
  #
  # This image is the user-facing way to run frankweiler on Linux
  # without trusting the bare binaries to your host shell — see
  # docs/dev/docker.md for the bind-mount + security model. The build is
  # NOT gated on the macOS matrix entry: a darwin-only build failure
  # shouldn't block publishing the Linux image.
  docker-publish:
    name: docker-publish (ghcr.io)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # GHA `ubuntu-latest` ships with ~14 GB free disk, which doesn't
      # fit a buildx run of our ~2.7 GB image × two architectures plus
      # the `type=gha,mode=max` cache export. v0.5.0 / v0.5.1 both
      # filled the runner's disk before docker-publish could finish.
      # Deleting the preinstalled Android SDK, .NET runtimes, Haskell
      # GHC, large apt packages we don't use, and swap reclaims ~30 GB —
      # from ~14 GB to ~44 GB free, comfortable headroom for the build.
      # PATH-installed tools (gh, docker, node, etc.) that the rest of
      # this job uses are left alone.
      #
      # Inlined shell doing what jlumbroso/free-disk-space@main used to
      # do here (an individually-owned action pinned to a mutable
      # branch; see the macos-app job's SUPPLY CHAIN note). Best-effort
      # `|| true` throughout: runner images shed packages over time, and
      # a missing one shouldn't fail a release — the docker build's own
      # disk usage is the real check.
      - name: Free up runner disk
        run: |
          set -euo pipefail
          echo "Free disk before:" && df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
              /opt/ghc /usr/local/.ghcup || true
          sudo apt-get remove -y --purge '^aspnetcore-.*' '^dotnet-.*' \
              '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli \
              google-chrome-stable firefox powershell mono-devel \
              libgl1-mesa-dri >/dev/null || true
          sudo apt-get autoremove -y >/dev/null || true
          sudo apt-get clean || true
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          echo "Free disk after:" && df -h /

      # Pull the just-published tarballs from the GitHub Release into
      # the build context at the layout frankweiler/docker/Dockerfile
      # expects (`dist/<arch>/<tarball>`). The repo is private, so the
      # public `releases/download/<tag>/<file>` URLs 404 anonymously —
      # we use `gh release download` with the workflow's GITHUB_TOKEN
      # for auth.
      - name: Stage tarballs into docker build context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p ctx/dist/amd64 ctx/dist/arm64
          cp frankweiler/docker/Dockerfile ctx/Dockerfile
          cp frankweiler/docker/entrypoint.sh ctx/entrypoint.sh
          gh release download "${REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern 'frankweiler-x86_64-unknown-linux-gnu.tar.gz' \
              --clobber --dir ctx/dist/amd64
          gh release download "${REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern 'frankweiler-aarch64-unknown-linux-gnu.tar.gz' \
              --clobber --dir ctx/dist/arm64
          ls -la ctx/dist/amd64 ctx/dist/arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Pin a recent BuildKit explicitly. The `buildx-stable-1` tag that
      # `setup-buildx-action` defaults to was on a BuildKit old enough to
      # still use the deprecated GHA Cache Service v1 API — which GitHub
      # turned off on 2025-06-30 — so `--cache-to type=gha` silently
      # no-op'd: tag pushes never imported a manifest and never exported
      # one (see runs 27184867988 / 27254340228 — no "importing cache
      # manifest" or "exporting cache layers" lines, and every layer
      # including the 2.25 GB `qmd pull` rebuilt from scratch). BuildKit
      # ≥ 0.18 speaks the v2 API; `moby/buildkit:latest` keeps us on
      # whatever's current.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push the multi-arch image in one go. We previously had
      # a separate `--load` amd64 build that ran a latchkey
      # services-register / auth-set / auth-list roundtrip against the
      # loaded image before this step pushed; that doubled cold-cache
      # wall time (the amd64 build was effectively done twice — once
      # for smoke, once for publish, with the latter cache-hitting via
      # GHA but still re-exporting layers) and the only thing it
      # uniquely caught was a regression in the entrypoint's
      # `LATCHKEY_ENCRYPTION_KEY` bootstrap. The other smoke checks
      # (`datalib-dag --version`, `frankweiler-http --help`)
      # duplicate `qmd --version` + binary-presence checks the
      # Dockerfile already runs inline. If the latchkey bootstrap ever
      # regresses, ghcr.io will briefly have a broken `:latest` until
      # someone notices — acceptable while the user base is small;
      # revisit if we ever get pulls from real users.
      #
      # `type=gha` cache means consecutive tag pushes within ~7 days
      # cache-hit both arches (the eviction window) — only the first
      # tag in a long while pays a full cold build. `mode=max` writes
      # ALL intermediate layers (not just the final image) so the
      # 2.25 GB qmd model layer is the dominant cache hit.
      - name: Build and push multi-arch image
        env:
          REF_NAME: ${{ github.ref_name }}
          # Plain-text progress so cache-import/export lines are
          # actually readable in the log — the TTY-style default hid
          # whether `type=gha` was working at all in earlier runs.
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          # ghcr.io image refs must be lowercase; GITHUB_REPOSITORY
          # preserves case from the org/repo slug. `${var,,}` lowercases.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          # `scope=docker-publish` makes the cache persist across
          # tag pushes. Without an explicit scope, type=gha defaults
          # to the workflow ref, so a tag push (refs/tags/v0.6.x)
          # gets a per-tag scope — i.e. every release starts cold and
          # re-runs the 2.25 GB `qmd pull` plus all the apt / node /
          # latchkey / doltlite-CLI layers from scratch. Mirrors the
          # devcontainer block below (which already does this right).
          #
          # `version=2` pins the GHA Cache Service v2 API. v1 was
          # turned off on 2025-06-30; without this, older BuildKit
          # builds silently no-op the cache (no import, no export).
          docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${image}:${version}" \
              --tag "${image}:latest" \
              --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --cache-from type=gha,scope=docker-publish,version=2 \
              --cache-to type=gha,mode=max,scope=docker-publish,version=2 \
              --push \
              ctx

  # Build and push the devcontainer image to ghcr.io. The devcontainer
  # image inherits from the prod image (`FROM
  # ghcr.io/imbue-ai/datalib:${PROD_IMAGE_TAG}`), so this MUST
  # run after `docker-publish` has uploaded prod:${version}. We pass
  # `--build-arg PROD_IMAGE_TAG=${version}` so the published
  # devcontainer:${version} inherits from the prod image at the same
  # tag — not whatever default is baked into `.devcontainer/Dockerfile`.
  #
  # Consumer: `.github/workflows/test.yml` runs `bazel test //...`
  # inside this image. The image carries the full Bazel/clang/cmake
  # toolchain that the prod image deliberately omits — see the
  # top-of-file comment in `.devcontainer/Dockerfile`.
  #
  # `WARM_BAZEL_CACHE=false` skips the in-image `bazelisk fetch` +
  # `bazelisk build` warmup. Two reasons:
  #   * The warmup compiles boring-sys2 / tokio / sqlx etc. under
  #     QEMU emulation on the arm64 leg, which would push tag-time
  #     publish wall-clock from ~10 min to ~1 hour.
  #   * BuildBuddy is the cross-run action cache for the test
  #     workflow — disk-baked outputs in the image would just
  #     duplicate what BuildBuddy already serves. Repository-cache
  #     fetches still happen at test time, but those are network-
  #     bound (cheap) rather than compile-bound.
  # Local devcontainer users still get warmup because they build
  # `.devcontainer/Dockerfile` themselves with the default
  # `WARM_BAZEL_CACHE=true`.
  devcontainer-publish:
    name: devcontainer-publish (ghcr.io)
    needs: docker-publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # `.devcontainer/Dockerfile`'s bazelisk warmup is gated off
          # (WARM_BAZEL_CACHE=false) so we don't actually need full
          # history here, but the bind-mounted workspace is the build
          # context regardless. Cheap to fetch deep; keep parity with
          # the build job above.
          fetch-depth: 0

      # Same disk-pressure reasoning and same inlined cleanup as
      # docker-publish above: multi-arch buildx + `type=gha,mode=max`
      # cache export needs more than the ~14 GB free that ubuntu-latest
      # ships with.
      - name: Free up runner disk
        run: |
          set -euo pipefail
          echo "Free disk before:" && df -h /
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet \
              /opt/ghc /usr/local/.ghcup || true
          sudo apt-get remove -y --purge '^aspnetcore-.*' '^dotnet-.*' \
              '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli \
              google-chrome-stable firefox powershell mono-devel \
              libgl1-mesa-dri >/dev/null || true
          sudo apt-get autoremove -y >/dev/null || true
          sudo apt-get clean || true
          sudo swapoff -a || true
          sudo rm -f /mnt/swapfile || true
          echo "Free disk after:" && df -h /

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # See note in docker-publish above: pin a current BuildKit so
      # GHA Cache Service v2 works.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image is published under `<repo>_devcontainer` rather than a
      # `devcontainer-` tag prefix on the prod image so the two are
      # cleanly separable in the GHCR UI and ghcr retention policies
      # can be set independently.
      - name: Build and push multi-arch devcontainer image
        env:
          REF_NAME: ${{ github.ref_name }}
          BUILDKIT_PROGRESS: plain
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}_devcontainer"
          docker buildx build \
              --file .devcontainer/Dockerfile \
              --platform linux/amd64,linux/arm64 \
              --build-arg PROD_IMAGE_TAG=${version} \
              --build-arg WARM_BAZEL_CACHE=false \
              --tag "${image}:${version}" \
              --tag "${image}:latest" \
              --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
              --cache-from type=gha,scope=devcontainer,version=2 \
              --cache-to type=gha,mode=max,scope=devcontainer,version=2 \
              --push \
              .
