# Builds the `//frankweiler/backend:dist` bins on macOS arm64 and
# attaches a tarball to a GitHub Release. Triggered by pushing a `v*`
# tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`). The tarball
# is published with a stable, un-versioned filename so the install
# script's `releases/latest/download/<name>` URL stays valid.
#
# Also runs on every push to main, with the release-publish steps
# skipped. The main-branch runs exist purely to warm the bazel caches:
# GitHub Actions caches are scoped by ref, and a tag push can only
# read caches written by its own ref or by the *default* branch, so
# tag-triggered runs would otherwise always pay the full cold-cache
# cost. Letting main write the cache means tag runs hit the warm cache.
name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  macos-arm64:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v6
        with:
          # `tools/workspace_status.sh` runs `git describe --tags`; the
          # default shallow clone has no tag history, so describe would
          # always fall back to a bare sha.
          fetch-depth: 0

      # bazel-contrib/setup-bazel wires actions/cache to bazel's various
      # caches so subsequent runs skip the ~10-minute cold-cache rebuild
      # of boring-sys2 / tokio / wreq etc. The four cache flags below
      # each pin a different layer:
      #   bazelisk-cache       — the bazel binary itself (~50 MB)
      #   disk-cache           — bazel's action cache (build outputs)
      #   repository-cache     — http_archive downloads (rules_rust, etc.)
      #   external-cache       — fully-resolved external repos (crate_universe deps)
      # All four share the 10 GB-per-repo actions/cache quota. The action
      # keys caches on the runner OS so cross-platform runs don't collide.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          external-cache: true

      - name: Show toolchain versions
        run: |
          bazel version
          rustc --version || true

      # Pre-create the host-side qmd model cache. .bazelrc has
      # `--sandbox_add_mount_pair=$(HOME)/.cache/qmd-models` so the
      # ingested_tng_qmd genrule can read its ~2GB GGUF cache without
      # re-downloading per action. macOS sandboxing refuses to mount a
      # nonexistent host path ("Operation not permitted (os error 1)"),
      # so create the dir up-front. Empty dir is fine — qmd populates it
      # on first run (this is also the first run for a fresh CI cache).
      - name: Ensure ~/.cache/qmd-models exists
        run: mkdir -p "$HOME/.cache/qmd-models"

      # Defense in depth against "tagged the wrong version" or "forgot
      # to bump Cargo.toml before tagging". The bazel test below already
      # asserts Cargo.toml == BUILD.bazel; this asserts tag == Cargo.toml.
      - name: Assert tag matches Cargo.toml version
        if: github.ref_type == 'tag'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${REF_NAME#v}"
          cargo_version="$(grep -E '^version = "[^"]+"$' frankweiler/backend/Cargo.toml | head -n1 | sed -E 's/^version = "([^"]+)"$/\1/')"
          if [[ "$tag_version" != "$cargo_version" ]]; then
              echo "Tag ${REF_NAME} disagrees with Cargo.toml workspace version ${cargo_version}." >&2
              echo "Bump frankweiler/backend/Cargo.toml [workspace.package].version to ${tag_version} before re-tagging." >&2
              exit 1
          fi

      # Both bazel invocations pass `-c opt` so they share the same
      # analysis cache. Mixing fastbuild + opt across consecutive
      # invocations would discard the analysis cache between them
      # ("WARNING: Build option --compilation_mode has changed,
      # discarding analysis cache"), costing ~30s of re-analysis on
      # the second invocation despite the action cache being warm.
      - name: Run version-consistency test
        run: bazel test //frankweiler/backend:version_consistency_test -c opt

      - name: Build dist bins
        run: bazel build //frankweiler/backend:dist -c opt

      # Run the full test suite under the same `-c opt` mode as the
      # build, so this step reuses the action cache the build just
      # populated (and writes new entries main-branch runs will hit
      # on the next tag push). Excludes tests tagged `requires-network`
      # — `precommit_test` (uv/pnpm/cargo against the source tree) and
      # `e2e_test` (Playwright browser fetch) — which need a richer
      # host environment than the default `macos-14` runner ships.
      # `manual`-tagged tests (the live API tests) are already excluded
      # by Bazel default.
      - name: Run test suite
        run: bazel test //... -c opt --test_tag_filters=-requires-network

      - name: Stage tarball
        id: stage
        if: github.ref_type == 'tag'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          triple="aarch64-apple-darwin"
          stage="frankweiler-${version}-${triple}"
          mkdir -p "${stage}"

          # Map bazel output paths -> public `frankweiler-<name>` names.
          # Add a line here when you add a binary to //frankweiler/backend:dist.
          # NOTE: keep the shim's installed name in sync with
          # `SIBLING_NAMES` in frankweiler/backend/etl/src/latchkey.rs —
          # `frankweiler-sync` resolves the shim via a sibling lookup
          # against this exact filename at runtime.
          cp bazel-bin/frankweiler/backend/sync/frankweiler_sync_bin "${stage}/frankweiler-sync"
          cp bazel-bin/frankweiler/backend/etl/latchkey_curl_shim "${stage}/frankweiler-latchkey-curl-shim"
          chmod +x "${stage}"/*

          tarball="frankweiler-${triple}.tar.gz"
          tar -czf "${tarball}" "${stage}"
          shasum -a 256 "${tarball}" > "${tarball}.sha256"

          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${tarball}.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.sha256 }}
          fail_on_unmatched_files: true
