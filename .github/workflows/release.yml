# Builds the `//frankweiler/backend:dist` bins on every supported
# host platform and attaches a per-triple tarball to a GitHub Release.
# Triggered by pushing a `v*` tag (e.g. `git tag v0.1.0 && git push
# origin v0.1.0`). Each tarball is published with a stable,
# un-versioned filename so the install script's
# `releases/latest/download/<name>` URL stays valid.
#
# Also runs on every push to main, with the release-publish steps
# skipped. The main-branch runs exist purely to warm the bazel caches:
# GitHub Actions caches are scoped by ref, and a tag push can only
# read caches written by its own ref or by the *default* branch, so
# tag-triggered runs would otherwise always pay the full cold-cache
# cost. Letting main write the cache means tag runs hit the warm cache.
name: release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GitHub Release
  packages: write  # needed for the docker-publish job to push to ghcr.io

# Serialize main-branch runs so the bazel disk-cache save at the end of
# one run finishes before the next run starts. Without this, two pushes
# in quick succession race on the same actions/cache key; the loser
# logs "Unable to reserve cache with key ... another job may be creating
# this cache" and skips its save, so a clean cache never replaces a
# stale/corrupt one. Don't cancel in progress — tag runs publish a
# release and must complete.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.triple }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      # One platform failing shouldn't cancel the others: a successful
      # build's tarball can still be published to the release while we
      # investigate the broken one.
      fail-fast: false
      matrix:
        include:
          - triple: aarch64-apple-darwin
            runs-on: macos-14  # Apple Silicon
          - triple: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
          - triple: aarch64-unknown-linux-gnu
            runs-on: ubuntu-24.04-arm  # GitHub-hosted native ARM Linux

    steps:
      - uses: actions/checkout@v6
        with:
          # `tools/workspace_status.sh` runs `git describe --tags`; the
          # default shallow clone has no tag history, so describe would
          # always fall back to a bare sha.
          fetch-depth: 0

      # bazel-contrib/setup-bazel wires actions/cache to bazel's various
      # caches so subsequent runs skip the ~10-minute cold-cache rebuild
      # of boring-sys2 / tokio / wreq etc. The four cache flags below
      # each pin a different layer:
      #   bazelisk-cache       — the bazel binary itself (~50 MB)
      #   disk-cache           — bazel's action cache (build outputs)
      #   repository-cache     — http_archive downloads (rules_rust, etc.)
      #   external-cache       — fully-resolved external repos (crate_universe deps)
      # All four share the 10 GB-per-repo actions/cache quota. Cache keys
      # include `${platform}-${arch}` (see setup-bazel's config.js
      # baseCacheKey), so every matrix entry gets its own slice —
      # darwin-arm64, linux-x64, and linux-arm64 never stomp each other.
      - uses: bazel-contrib/setup-bazel@0.19.0
        with:
          bazelisk-cache: true
          disk-cache: true
          repository-cache: true
          external-cache: true

      # Install the Linux-only build dependencies the macOS runner gets
      # for free via Xcode CLT / Homebrew:
      #   cmake        — boring-sys2's build script shells out to it
      #                  to build BoringSSL.
      #   clang        — driver binary plus llvm-config; the latter
      #                  prints the canonical libclang install dir.
      #   libclang-dev — provides the libclang.so symlink. Bindgen
      #                  (in libsqlite3-sys's build script) loads it
      #                  via clang-sys to parse <sqlite3.h>.
      #
      # NOTE: deliberately not passing `--no-install-recommends` here.
      # Ubuntu's `libclang-dev` is a transition metapackage; without
      # recommends, apt installs the empty stub and skips the
      # libclang1-NN runtime package that actually carries libclang.so
      # — which is exactly what bit us on the first attempt
      # (b4b12e4): the package "installed" but bindgen still failed
      # with "Unable to find libclang".
      #
      # Skipped on macOS; that runner already has clang via the SDK
      # and cmake via Homebrew (`brew install bazel cmake` per README).
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          # `llvm` brings in the `llvm-config` binary — clang and
          # libclang-dev DO NOT, contrary to intuition. The
          # ubuntu-24.04-arm runner happens to have llvm preinstalled
          # so the previous attempt (without `llvm` here) worked on
          # arm64; ubuntu-latest x86_64 does not, so the same step
          # silently set LIBCLANG_PATH="" and bindgen panicked
          # downstream. See run 26860782615 for the trace.
          sudo apt-get install -y \
            cmake \
            clang \
            libclang-dev \
            llvm
          # Surface libclang's directory so bindgen finds it inside
          # bazel's processwrapper-sandbox (forwarded via
          # --action_env on the bazel commands below, which override
          # .bazelrc's macOS default). Using llvm-config keeps us
          # robust to LLVM version bumps — whatever clang the runner
          # installs, we point at its actual libdir.
          lib_dir="$(llvm-config --libdir)"
          if [[ -z "$lib_dir" ]]; then
              echo "ERROR: llvm-config --libdir returned empty." >&2
              echo "PATH=$PATH" >&2
              command -v llvm-config || true
              exit 1
          fi
          echo "Resolved LIBCLANG_PATH=$lib_dir"
          echo "LIBCLANG_PATH=$lib_dir" >> "$GITHUB_ENV"

      - name: Show toolchain versions
        run: |
          bazel version
          rustc --version || true

      # Pre-create the host-side qmd model cache. .bazelrc has
      # `--sandbox_add_mount_pair=$(HOME)/.cache/qmd/models` so the
      # ingested_tng_qmd genrule can read its ~2GB GGUF cache without
      # re-downloading per action. macOS sandboxing refuses to mount a
      # nonexistent host path ("Operation not permitted (os error 1)"),
      # so create the dir up-front; harmless on Linux. Empty dir is
      # fine — qmd populates it on first run.
      - name: Ensure ~/.cache/qmd/models exists
        run: mkdir -p "$HOME/.cache/qmd/models"

      # Defense in depth against "tagged the wrong version" or "forgot
      # to bump Cargo.toml before tagging". The bazel test below already
      # asserts Cargo.toml == BUILD.bazel; this asserts tag == Cargo.toml.
      - name: Assert tag matches Cargo.toml version
        if: github.ref_type == 'tag'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          tag_version="${REF_NAME#v}"
          cargo_version="$(grep -E '^version = "[^"]+"$' frankweiler/backend/Cargo.toml | head -n1 | sed -E 's/^version = "([^"]+)"$/\1/')"
          if [[ "$tag_version" != "$cargo_version" ]]; then
              echo "Tag ${REF_NAME} disagrees with Cargo.toml workspace version ${cargo_version}." >&2
              echo "Bump frankweiler/backend/Cargo.toml [workspace.package].version to ${tag_version} before re-tagging." >&2
              exit 1
          fi

      # Both bazel invocations pass `-c opt` so they share the same
      # analysis cache. Mixing fastbuild + opt across consecutive
      # invocations would discard the analysis cache between them
      # ("WARNING: Build option --compilation_mode has changed,
      # discarding analysis cache"), costing ~30s of re-analysis on
      # the second invocation despite the action cache being warm.
      #
      # `BAZEL_EXTRA` carries platform-specific bazel args:
      #   * Linux — override `.bazelrc`'s macOS LIBCLANG_PATH default
      #     with the path the install step computed via llvm-config.
      #     Later flags win in bazel, so the command-line value beats
      #     the workspace .bazelrc.
      #   * macOS — empty; `.bazelrc` already points at Xcode CLT's
      #     libclang.dylib.
      - name: Compute platform-specific bazel args
        id: bazelargs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$RUNNER_OS" == "Linux" ]]; then
              if [[ -z "${LIBCLANG_PATH:-}" ]]; then
                  echo "ERROR: LIBCLANG_PATH unset/empty on Linux — install step regressed." >&2
                  exit 1
              fi
              echo "extra=--action_env=LIBCLANG_PATH=${LIBCLANG_PATH}" >> "$GITHUB_OUTPUT"
          else
              echo "extra=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run version-consistency test
        run: bazel test //frankweiler/backend:version_consistency_test -c opt ${{ steps.bazelargs.outputs.extra }}

      - name: Build dist bins
        run: bazel build //frankweiler/backend:dist -c opt ${{ steps.bazelargs.outputs.extra }}

      # NOTE: the full `bazel test //...` step previously lived here
      # but was removed because rules_rust's ExtractCargoTomlEnvVars
      # actions kept tripping "Lost inputs no longer available
      # remotely" against the bazel-contrib/setup-bazel disk cache
      # (every release run rebuilt 1500+ actions and the broken cache
      # never healed). Developers run the suite locally via
      # `bazelisk test //...`; this workflow only gates release
      # artifacts on `version_consistency_test` + the dist build.

      - name: Stage tarball
        id: stage
        if: github.ref_type == 'tag'
        env:
          REF_NAME: ${{ github.ref_name }}
          TRIPLE: ${{ matrix.triple }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          stage="frankweiler-${version}-${TRIPLE}"
          mkdir -p "${stage}"

          # Map bazel output paths -> public `frankweiler-<name>` names.
          # Add a line here when you add a binary to //frankweiler/backend:dist.
          # NOTE: keep the shim's installed name in sync with
          # `SIBLING_NAMES` in frankweiler/backend/etl/src/latchkey.rs —
          # `frankweiler-sync` resolves the shim via a sibling lookup
          # against this exact filename at runtime.
          cp bazel-bin/frankweiler/backend/sync/frankweiler_sync_bin "${stage}/frankweiler-sync"
          cp bazel-bin/frankweiler/backend/http/frankweiler_http_bin "${stage}/frankweiler-http"
          cp bazel-bin/frankweiler/backend/etl/latchkey_curl_shim "${stage}/frankweiler-latchkey-curl-shim"
          chmod +x "${stage}"/*

          tarball="frankweiler-${TRIPLE}.tar.gz"
          tar -czf "${tarball}" "${stage}"
          # Linux runners have `sha256sum`; macOS has `shasum`. Use
          # whichever is available so the same step works on both.
          if command -v sha256sum >/dev/null; then
              sha256sum "${tarball}" > "${tarball}.sha256"
          else
              shasum -a 256 "${tarball}" > "${tarball}.sha256"
          fi

          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${tarball}.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.sha256 }}
          fail_on_unmatched_files: true

  # Build and push the multi-arch runtime image to ghcr.io. Runs after
  # the matrix `build` job has uploaded both Linux tarballs to the
  # GitHub Release so we can fetch them by their stable
  # `releases/download/<tag>/...` URLs from inside the docker build
  # context. Tag-only; main-branch runs of this workflow skip it.
  #
  # This image is the user-facing way to run frankweiler on Linux
  # without trusting the bare binaries to your host shell — see
  # docs/docker.md for the bind-mount + security model. The build is
  # NOT gated on the macOS matrix entry: a darwin-only build failure
  # shouldn't block publishing the Linux image.
  docker-publish:
    name: docker-publish (ghcr.io)
    if: github.ref_type == 'tag'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Pull the just-published tarballs from the GitHub Release into
      # the build context at the layout frankweiler/docker/Dockerfile
      # expects (`dist/<arch>/<tarball>`). The repo is private, so the
      # public `releases/download/<tag>/<file>` URLs 404 anonymously —
      # we use `gh release download` with the workflow's GITHUB_TOKEN
      # for auth.
      - name: Stage tarballs into docker build context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p ctx/dist/amd64 ctx/dist/arm64
          cp frankweiler/docker/Dockerfile ctx/Dockerfile
          cp frankweiler/docker/entrypoint.sh ctx/entrypoint.sh
          gh release download "${REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern 'frankweiler-x86_64-unknown-linux-gnu.tar.gz' \
              --clobber --dir ctx/dist/amd64
          gh release download "${REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern 'frankweiler-aarch64-unknown-linux-gnu.tar.gz' \
              --clobber --dir ctx/dist/arm64
          ls -la ctx/dist/amd64 ctx/dist/arm64

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Smoke test BEFORE pushing: build the amd64 image locally
      # (`--load`), then run the `latchkey services register` + `auth
      # set` + `auth list` roundtrip against a tmp `.latchkey` dir.
      # This validates the assumption that latchkey's encryption falls
      # back to a file-keyed scheme on a keyring-less Linux container
      # (no Secret Service running), so credentials written inside the
      # container can be read back by the same container. If this
      # assumption ever breaks, we want to fail BEFORE pushing :latest.
      #
      # Cache layer with `type=gha` so subsequent tag runs don't pay
      # the ~2.25 GB `qmd pull` cost from scratch every time — that
      # download has been hitting HuggingFace rate limits, and the
      # base apt + npm steps alone run for ~5 minutes cold. `mode=max`
      # writes ALL intermediate layers (not just the final image) so
      # the qmd model layer is reusable across tags. GHA caches have a
      # 10 GB-per-repo quota; the qmd layer alone is 2.25 GB so we
      # have headroom but not infinite. Same cache key is reused by
      # the multi-arch push step below, so amd64 layers built here
      # are reused there.
      - name: Smoke test (latchkey roundtrip inside the image)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          tag="ghcr.io/${GITHUB_REPOSITORY,,}:smoke-${version}"
          docker buildx build \
              --platform linux/amd64 \
              --tag "${tag}" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --load \
              ctx
          tmp_latchkey="$(mktemp -d)"
          trap 'rm -rf "${tmp_latchkey}"' EXIT
          docker run --rm -v "${tmp_latchkey}:/root/.latchkey" "${tag}" \
              latchkey services register claude-ai --base-api-url=https://claude.ai/
          docker run --rm -v "${tmp_latchkey}:/root/.latchkey" "${tag}" \
              latchkey auth set claude-ai -H "Cookie: sessionKey=smoke-test-not-real"
          # The roundtrip assertion: a fresh container reading the same
          # bind-mounted dir must see the credential we just stored.
          out="$(docker run --rm -v "${tmp_latchkey}:/root/.latchkey" "${tag}" latchkey auth list)"
          echo "${out}"
          echo "${out}" | grep -q claude-ai
          # Verify binaries respond to --version (cheap sanity check).
          docker run --rm "${tag}" frankweiler-sync --version
          # frankweiler-http requires a positional DATA_ROOT, so we can't
          # --version it; just verify it loads its dynamic libs by asking
          # for help (which exits 0 after clap renders usage).
          docker run --rm --entrypoint /usr/local/bin/frankweiler-http "${tag}" --help

      - name: Build and push multi-arch image
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          # ghcr.io image refs must be lowercase; GITHUB_REPOSITORY
          # preserves case from the org/repo slug. `${var,,}` lowercases.
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          # Same `type=gha` cache as the smoke step above. amd64 layers
          # built during the smoke run are already in the cache; this
          # invocation reuses them and only builds arm64 fresh on the
          # first cold tag, then both arches cache-hit on subsequent
          # tags.
          docker buildx build \
              --platform linux/amd64,linux/arm64 \
              --tag "${image}:${version}" \
              --tag "${image}:latest" \
              --cache-from type=gha \
              --cache-to type=gha,mode=max \
              --push \
              ctx
