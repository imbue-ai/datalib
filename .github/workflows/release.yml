# Builds the `//frankweiler/backend:dist` bins on macOS arm64 and
# attaches a tarball to a GitHub Release. Triggered by pushing a `v*`
# tag (e.g. `git tag v0.1.0 && git push origin v0.1.0`). The tarball
# is published with a stable, un-versioned filename so the install
# script's `releases/latest/download/<name>` URL stays valid.
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  macos-arm64:
    runs-on: macos-14  # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      # bazelisk is preinstalled on macos-14 runners as `bazelisk` and
      # also symlinked as `bazel`; no setup-bazel action needed.
      - name: Show toolchain versions
        run: |
          bazelisk version
          rustc --version || true

      - name: Build dist bins
        run: bazelisk build //frankweiler/backend:dist -c opt

      - name: Stage tarball
        id: stage
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${REF_NAME#v}"
          triple="aarch64-apple-darwin"
          stage="frankweiler-${version}-${triple}"
          mkdir -p "${stage}"

          # Map bazel output paths -> public `frankweiler-<name>` names.
          # Add a line here when you add a binary to //frankweiler/backend:dist.
          cp bazel-bin/frankweiler/backend/sync/frankweiler_sync_bin "${stage}/frankweiler-sync"
          chmod +x "${stage}"/*

          tarball="frankweiler-${triple}.tar.gz"
          tar -czf "${tarball}" "${stage}"
          shasum -a 256 "${tarball}" > "${tarball}.sha256"

          echo "tarball=${tarball}" >> "$GITHUB_OUTPUT"
          echo "sha256=${tarball}.sha256" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.stage.outputs.tarball }}
            ${{ steps.stage.outputs.sha256 }}
          fail_on_unmatched_files: true
