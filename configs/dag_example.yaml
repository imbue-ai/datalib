# New-format DAG config (run with `datalib-dag`), equivalent to the old
# stanza config:
#
#   sources:
#     - name: slack
#       source:
#         type: slack_api
#         sync: {media: true, channels: ["chat-qi"], since: "2026-06-15"}
#     - name: claude
#       source:
#         type: claude_api
#         sync: {conv_uuids: ["f6e7d4bb-991e-433d-91f0-e19b2c8a1e37"]}
#
# The user declares steps directly; edges are derived from the artifact
# paths (never written by hand). Each step is an arbitrary `command:`
# (see docs/dev/step_protocol.md); the runner appends the declared
# `params`/`inputs`/`outputs` as `--params`/`--inputs`/`--outputs`
# JSON flags. For the built-in `datalib-step` commands, download and
# render take the provider as a nested subcommand; `params:` is
# per-phase — the download step carries the provider's download
# config (no `type:` tag — the command carries it; no `name:` — the
# step derives the `<name>/…` prefix from its first output), and the
# render step carries only render knobs (none for most providers;
# e.g. beeper's `period`, perseus's `alignment_pairs`). The
# `grid_index` and `qmd_index` steps are source-independent fan-ins
# over every rendered_md tree.
#
#   bazelisk build //frankweiler/backend/dag:datalib_dag \
#                  //frankweiler/backend/datalib_step:datalib_step
#   bindir=$(mktemp -d) && ln -s "$PWD"/bazel-bin/frankweiler/backend/datalib_step/datalib_step "$bindir"/datalib-step
#   bazel-bin/frankweiler/backend/dag/datalib_dag configs/dag_example.yaml \
#       --binary-dir "$bindir"
#
# (`--binary-dir` is prepended to every step's PATH so `command:` can
# say `datalib-step` bare; a packaged install lays `datalib-step` next
# to `datalib-dag` and needs no flag at all.)
#
# data_root defaults to the directory this file lives in; set it
# explicitly for a real run.
data_root: ~/tmp/dr-dag

steps:
  # ── slack ──────────────────────────────────────────────────────────
  - id: slack.download
    command: datalib-step download slack_api
    outputs: [slack/raw]
    params:
      sync:
        media: true
        direct_messages: false  # opt in to DMs and group DMs
        channels: ["chat-qi"]
        since: "2026-06-15"

  - id: slack.render
    command: datalib-step render slack_api
    inputs: [slack/raw]
    outputs: [slack/rendered_md]

  # ── claude ─────────────────────────────────────────────────────────
  # Prerequisite (one-time): register claude.ai with latchkey and
  # supply your sessionKey cookie (DevTools → Application → Cookies):
  #   npx -y latchkey services register claude-ai --base-api-url="https://claude.ai/"
  #   npx -y latchkey auth set claude-ai -H "Cookie: sessionKey=$(pbpaste)"
  # See docs/user/getting_your_data.md for the full walkthrough.
  - id: claude.download
    command: datalib-step download claude_api
    outputs: [claude/raw]
    params:
      sync:
        conv_uuids: ["f6e7d4bb-991e-433d-91f0-e19b2c8a1e37"]

  - id: claude.render
    command: datalib-step render claude_api
    inputs: [claude/raw]
    outputs: [claude/rendered_md]

  # ── shared fan-in steps ────────────────────────────────────────────
  # `**/rendered_md` matches every render step's output; adding a new
  # source above automatically feeds these.
  - id: grid_index
    command: datalib-step grid_index
    inputs: ["**/rendered_md"]
    outputs: [system/backend_index]

  - id: qmd_index
    command: datalib-step qmd_index
    inputs: ["**/rendered_md"]
    outputs: [system/qmd]
