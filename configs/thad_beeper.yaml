# Beeper-only dev config for iterating on the Beeper provider.
# Reads the desktop app's on-disk SQLite directly; no network or auth.
#
#   bazelisk run //frankweiler/backend/sync:frankweiler_sync_bin -- \
#     --config "$(pwd)/configs/thad_beeper.yaml" \
#     --now "$(date -u +%Y-%m-%dT%H:%M:%SZ)"

data_root: ~/mixed_up_files.thad_beeper

dolt:
  db_filename: backend_index.doltlite_db

sources:
  - name: beeper
    type: beeper
    sync:
      # Canonical chat-network names to ingest. Each maps to one or
      # more accountID prefixes inside BeeperTexts/index.db.
      sources: ["signal", "googlechat"]
      # Copy cached media bytes (avatars, attachments) into the blobs
      # table. Off = metadata + source URL only.
      media: true
