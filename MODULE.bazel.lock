                "BUILD.bazel": "###############################################################################\n# @generated\n# DO NOT MODIFY: This file is auto-generated by a crate_universe tool. To \n# regenerate this file, run the following:\n#\n#     bazel mod show_repo 'personal_mirror'\n###############################################################################\n\npackage(default_visibility = [\"//visibility:public\"])\n\nexports_files(\n    [\n        \"cargo-bazel.json\",\n        \"crates.bzl\",\n        \"defs.bzl\",\n    ] + glob(\n        allow_empty = True,\n        include = [\"*.bazel\"],\n    ),\n)\n\nfilegroup(\n    name = \"srcs\",\n    srcs = glob(\n        allow_empty = True,\n        include = [\n            \"*.bazel\",\n            \"*.bzl\",\n        ],\n    ),\n)\n\n# Workspace Member Dependencies\nalias(\n    name = \"anyhow-1.0.102\",\n    actual = \"@frankweiler_crates__anyhow-1.0.102//:anyhow\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"anyhow\",\n    actual = \"@frankweiler_crates__anyhow-1.0.102//:anyhow\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"axum-0.8.9\",\n    actual = \"@frankweiler_crates__axum-0.8.9//:axum\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"axum\",\n    actual = \"@frankweiler_crates__axum-0.8.9//:axum\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"chrono-0.4.44\",\n    actual = \"@frankweiler_crates__chrono-0.4.44//:chrono\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"chrono\",\n    actual = \"@frankweiler_crates__chrono-0.4.44//:chrono\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"rusqlite-0.32.1\",\n    actual = \"@frankweiler_crates__rusqlite-0.32.1//:rusqlite\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"rusqlite\",\n    actual = \"@frankweiler_crates__rusqlite-0.32.1//:rusqlite\",\n    tags = [\"manual\"],\n)\n\nalias(\n    name = \"serde-1.0.228\",\n    actual = \"@frankweiler_crates__serde-1.0.228//:serde\",\n    tags = [\"manual\"]