# ~/.config/frankweiler/config.yaml -- or anywhere you look.
data_root: ~/mixed_up_files  # Where the downloaded data gets written.

dolt:
  port: 3306

sources:
  - name: anthropic-api
    type: claude_api
    sync: {}
      # overlap: 50              # re-fetch the N most-recently-updated
      # refresh_window_days: 7   # treat anything older than this as cold

  - name: slack
    type: slack_api
    sync:
      media: true
      channels:
        - "project-data-liberation"

  # Google Takeout Gmail export. `sync:` is intentionally omitted —
  # that puts the email provider in translate-only mbox mode, reading
  # the file at `input_path` instead of talking to a JMAP server.
  # Point this at the .mbox unpacked from your Takeout zip.
  - name: gmail-takeout
    type: email
    input_path: ~/backups/Takeout/Mail/All mail Including Spam and Trash.mbox
