# Minimal config in the steps format `datalib-dag` runs: one source
# (claude.ai conversations) plus the two shared index steps. See
# configs/dag_example.yaml for a walkthrough of the format.

data_root: ~/claude_data_liberated  # Where the downloaded data gets written.

steps:
  - id: claude_chats.download
    command: datalib-step download claude_api
    outputs: [claude_chats/raw]
    params:
      sync: {}

  - id: claude_chats.render
    command: datalib-step render claude_api
    inputs: [claude_chats/raw]
    outputs: [claude_chats/rendered_md]

  - id: grid_index
    command: datalib-step grid_index
    inputs: ["**/rendered_md"]
    outputs: [system/backend_index]

  - id: qmd_index
    command: datalib-step qmd_index
    inputs: ["**/rendered_md"]
    outputs: [system/qmd]
