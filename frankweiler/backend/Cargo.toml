[workspace]
resolver = "2"
members = [
    "schema",
    "core",
    "http",
    "tauri-backend",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.83"
publish = false

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
anyhow = "1.0"
thiserror = "2.0"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "signal"] }
axum = "0.8"
tower-http = { version = "0.6.8", features = ["cors"] }
