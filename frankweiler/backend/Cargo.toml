[workspace]
resolver = "2"
members = [
    "schema",
    "core",
    "http",
    "tauri-backend",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.83"
publish = false

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
thiserror = "2.0"
