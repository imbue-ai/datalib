# MD5 is the trailing file-integrity checksum (not cryptographic);
# used only when assembling fixture / test crypt15 files via the
# encrypt path. Decrypt doesn't need it because the GCM auth tag
# covers what matters.
md-5 = { workspace = true }

[dev-dependencies]
tempfile = "3"
hex = "0.4"
