[package]
name = "frankweiler-etl-whatsapp"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_whatsapp"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-etl-chat-common = { path = "../../chat-common" }
frankweiler-time = { path = "../../../time" }
frankweiler-schema = { path = "../../../schema" }
frankweiler-index-lib = { path = "../../../index_lib" }
frankweiler-whatsapp-backup = { path = "../../../whatsapp-backup" }
uuid = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true }
sqlx = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
tracing = "0.1"
tempfile = "3"
walkdir = { workspace = true }

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
