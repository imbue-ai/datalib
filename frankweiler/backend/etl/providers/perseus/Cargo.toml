[package]
name = "frankweiler-etl-perseus"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_perseus"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-time = { path = "../../../time" }
frankweiler-schema = { path = "../../../schema" }
frankweiler-index-lib = { path = "../../../index_lib" }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
quick-xml = "0.36"
# Async runtime — needed for the `extract::fetch` entry point which is
# `async` to match every other provider's `FetchOptions -> FetchSummary`
# signature. The shared `latchkey_curl` is async too.
tokio = { workspace = true, features = ["process", "io-util", "time", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
tracing = "0.1"

# Sentence-level bilingual alignment uses Ancient-Greek-BERT (BERT-base)
# loaded via candle-transformers. Pure-Rust inference (no libtorch);
# weights are pulled lazily from HuggingFace via hf-hub on the first
# translate run and cached under hf-hub's default location
# (`~/.cache/huggingface/hub/`).
#
# Candle 0.10+ is the first release that builds cleanly against current
# rand_distr; 0.7 hits a `Distribution<f16>` resolution failure during
# `cargo build`.
candle-core = "0.10"
candle-nn = "0.10"
candle-transformers = "0.10"
hf-hub = { version = "0.3", default-features = false, features = ["online", "tokio"] }
tokenizers = { version = "0.20", default-features = false, features = ["onig", "http"] }

# On Linux, hf-hub's HTTP stack (native-tls → openssl) would otherwise
# link the distro's libssl.so at build time — which breaks the
# fully-static `*-unknown-linux-musl` release builds outright (no
# system libssl to link against) and made the gnu release binaries
# depend on the host having a compatible libssl/libcrypto installed.
# The `vendored` feature switches openssl-sys to compiling OpenSSL
# from source (openssl-src) and linking it statically on ALL Linux
# release flavors, gnu included.
#
# Gated on `target_os = "linux"` rather than `target_env = "musl"`
# because crate_universe resolves musl platforms through the gnu
# triples (rules_rust maps both to the same `@platforms//` constraint
# set), so a musl-only cfg would never activate under Bazel. macOS is
# unaffected: native-tls uses Security.framework there and openssl-sys
# never enters that target's graph.
#
# Known limitation: rules_rust compiles cargo build-script BINARIES
# against the EXEC platform's feature resolution, so cross-compiling
# a linux target FROM macOS strips the linux-only `vendored` feature
# out of openssl-sys's build script and it fails looking for a system
# OpenSSL. Both CI paths (release runners, devcontainer) have linux
# exec platforms and are unaffected; it only limits local
# `--config=musl-*` builds of perseus-dependent targets on macs.
[target.'cfg(target_os = "linux")'.dependencies]
openssl-sys = { version = "0.9", features = ["vendored"] }

[dev-dependencies]
tempfile = "3"
