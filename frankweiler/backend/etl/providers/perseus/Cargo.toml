[package]
name = "frankweiler-etl-perseus"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_perseus"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-time = { path = "../../../time" }
frankweiler-schema = { path = "../../../schema" }
frankweiler-index-lib = { path = "../../../index_lib" }
anyhow = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
quick-xml = "0.36"
# Async runtime — needed for the `extract::fetch` entry point which is
# `async` to match every other provider's `FetchOptions -> FetchSummary`
# signature. The shared `latchkey_curl` is async too.
tokio = { workspace = true, features = ["process", "io-util", "time", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
tracing = "0.1"

# Sentence-level bilingual alignment uses Ancient-Greek-BERT (BERT-base)
# loaded via candle-transformers. Pure-Rust inference (no libtorch);
# weights are pulled lazily from HuggingFace via hf-hub on the first
# translate run and cached under hf-hub's default location
# (`~/.cache/huggingface/hub/`).
#
# Candle 0.10+ is the first release that builds cleanly against current
# rand_distr; 0.7 hits a `Distribution<f16>` resolution failure during
# `cargo build`.
candle-core = "0.10"
candle-nn = "0.10"
candle-transformers = "0.10"
# TLS backend: rustls (via `rustls-tls`), NOT the native-tls default.
# native-tls means openssl on Linux, and openssl — whether the
# distro's libssl.so or the `vendored` build — is what stood between
# us and fully-static `*-unknown-linux-musl` release binaries: a
# dynamic libssl can't be statically linked, and openssl-src's
# build script reads the OpenSSL C tree out of a SIBLING crate's
# directory via a compile-time-baked CARGO_MANIFEST_DIR path that
# doesn't survive Bazel's action sandboxing (rules_rust#1519).
# rustls' ring backend keeps its C sources inside its own crate,
# which crate_universe's build-script globs already handle — same
# pattern as zstd-sys / onig_sys. Certificate roots come bundled
# (webpki-roots), so the binaries don't even need /etc/ssl at
# runtime; this stack only ever talks to huggingface.co.
#
# hf-hub 0.4 is the first release with the `rustls-tls` feature;
# tokenizers 0.21 is the first that depends on hf-hub 0.4 (with
# default-features = false, so it no longer drags native-tls back in
# the way 0.20's `http` feature did).
hf-hub = { version = "0.4.3", default-features = false, features = ["tokio", "rustls-tls"] }
tokenizers = { version = "0.21", default-features = false, features = ["onig", "http", "rustls-tls"] }

[dev-dependencies]
tempfile = "3"
