[package]
name = "frankweiler-etl-hermes"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_hermes"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-etl-chat-common = { path = "../../chat-common" }
async-trait = "0.1"
frankweiler-obs = { path = "../../../obs" }
frankweiler-time = { path = "../../../time" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
uuid = { workspace = true }

[dev-dependencies]
insta = { version = "1.41", features = ["json"] }
tempfile = "3"
