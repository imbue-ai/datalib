[package]
name = "frankweiler-etl-google-takeout"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_google_takeout"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-etl-chat-common = { path = "../../chat-common" }
frankweiler-etl-macros = { path = "../../macros" }
frankweiler-obs = { path = "../../../obs" }
frankweiler-time = { path = "../../../time" }
frankweiler-schema = { path = "../../../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
sqlx = { workspace = true }
# Google Voice takeout is XHTML; quick-xml pull-parses it (with a
# `<br>`→newline pre-pass) into structured rows.
quick-xml = "0.36"
sha2 = "0.10"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
sqlx = { workspace = true }
