[package]
name = "frankweiler-etl-fsindex"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_fsindex"
path = "src/lib.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-time = { path = "../../../time" }
frankweiler-obs = { path = "../../../obs" }
clap = { version = "4.5", features = ["derive", "env"] }
sqlx = { workspace = true }
anyhow = { workspace = true }
serde = { workspace = true }
serde_yaml = { workspace = true }
tokio = { workspace = true, features = ["fs", "io-util", "macros", "rt-multi-thread", "time"] }
tracing = "0.1"
uuid = { workspace = true }
blake3 = { version = "1", default-features = false, features = ["std", "pure", "mmap"] }
walkdir = { workspace = true }
ignore = { workspace = true }
hex = "0.4"
futures = "0.3"

[dev-dependencies]
insta = { version = "1.41", features = ["json"] }
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
