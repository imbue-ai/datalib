[package]
name = "frankweiler-etl-slack"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_slack"
path = "src/lib.rs"

[[bin]]
name = "slack-download"
path = "src/bin/slack_download.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-obs = { path = "../../../obs" }
frankweiler-schema = { path = "../../../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
regex = "1.11"
once_cell = "1.20"
emojis = "0.6"
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"
sqlx = { workspace = true }
tempfile = "3"

[dev-dependencies]
insta = { version = "1.41", features = ["json", "redactions"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
