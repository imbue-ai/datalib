[package]
name = "frankweiler-etl-jmap"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_jmap"
path = "src/lib.rs"

[[bin]]
name = "jmap-download"
path = "src/bin/jmap_download.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-obs = { path = "../../../obs" }
frankweiler-schema = { path = "../../../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"
sqlx = { workspace = true }
sha2 = "0.10"
tempfile = "3"

[dev-dependencies]
insta = { version = "1.41", features = ["json", "redactions"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
