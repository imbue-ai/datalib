[package]
name = "frankweiler-etl-notion"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_notion"
path = "src/lib.rs"

[[bin]]
name = "notion-download"
path = "src/bin/notion_download.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-obs = { path = "../../../obs" }
frankweiler-schema = { path = "../../../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"
regex = "1.11"
once_cell = "1.20"
uuid = { workspace = true }
tempfile = "3"

[dev-dependencies]
insta = { version = "1.41", features = ["json", "redactions"] }
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
# Stderr subscriber used by `gather_documents_is_linear_in_blocks` to
# surface per-phase timing from `gather_documents` — the slow test in
# this binary, dominates `notion_unittests` wall time. See the test's
# `init_tracing()` helper.
tracing-subscriber = { version = "0.3", default-features = false, features = ["fmt"] }
