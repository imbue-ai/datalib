[package]
name = "frankweiler-etl-beeper"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl_beeper"
path = "src/lib.rs"

[[bin]]
name = "beeper-download"
path = "src/bin/beeper_download.rs"

[[bin]]
name = "beeper-inspect"
path = "src/bin/beeper_inspect.rs"

[dependencies]
frankweiler-etl = { path = "../.." }
frankweiler-obs = { path = "../../../obs" }
frankweiler-schema = { path = "../../../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
uuid = { workspace = true, features = ["v5"] }
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"
sqlx = { workspace = true }

[dev-dependencies]
insta = { version = "1.41", features = ["json", "redactions"] }
tempfile = "3"
tokio = { workspace = true, features = ["macros", "rt-multi-thread"] }
