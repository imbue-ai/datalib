[package]
name = "frankweiler-etl"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl"
path = "src/lib.rs"

[[bin]]
name = "grid-rows-load"
path = "src/bin/grid_rows_load.rs"

# Curl-compatible CLI shim wrapping rquest's Chrome TLS impersonation.
# Mirror of `src/download/latchkey_curl_shim.py` — point latchkey at it
# via `LATCHKEY_CURL=<path-to-this-binary>` to clear Cloudflare without
# a separate curl-impersonate install.
[[bin]]
name = "latchkey-curl-shim"
path = "src/bin/latchkey_curl_shim.rs"

[dependencies]
frankweiler-core = { path = "../core" }
frankweiler-obs = { path = "../obs" }
frankweiler-schema = { path = "../schema" }
frankweiler-qmd-indexer = { path = "../qmd_indexer" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
sqlx = { workspace = true }
sha2 = "0.10"
blake3 = "1"
tempfile = "3"
# Bazel runfiles lookup, so the shared `latchkey::ensure_curl_shim`
# resolver can find our Chrome-impersonating curl shim under
# `bazel run` / `bazel test`. Falls through cleanly outside Bazel.
runfiles = "0.2"

# Observability — the heavy stack (tracing-subscriber, indicatif,
# OTLP) lives in `frankweiler-obs`. We keep `tracing` here for the
# `events` module's `info!`/`debug!` calls and `clap` for the
# `grid_rows_load` binary.
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"

# Curl-compatible TLS-impersonating HTTP client. Used by
# `latchkey-curl-shim`; gated by a feature in case downstream
# consumers don't want the boring-ssl build cost.
wreq = { version = "=6.0.0-rc.28", default-features = false, features = ["webpki-roots"] }
wreq-util = "=3.0.0-rc.11"

[dev-dependencies]
tempfile = "3"
