[package]
name = "frankweiler-etl"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_etl"
path = "src/lib.rs"

[[bin]]
name = "grid-rows-load"
path = "src/bin/grid_rows_load.rs"

[dependencies]
frankweiler-core = { path = "../core" }
frankweiler-schema = { path = "../schema" }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
chrono = { workspace = true }
tokio = { workspace = true, features = ["process", "fs", "io-util", "time", "rt-multi-thread", "macros"] }
sqlx = { workspace = true }

# Observability stack — emitted as structured events, rendered as a
# progress UI on a TTY, JSON on stderr otherwise, and optionally
# exported to an OTLP collector when --otlp-endpoint is set.
clap = { version = "4.5", features = ["derive", "env"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "fmt"] }
tracing-indicatif = "0.3"
opentelemetry = "0.27"
opentelemetry_sdk = { version = "0.27", features = ["rt-tokio"] }
opentelemetry-otlp = { version = "0.27", features = ["grpc-tonic", "trace"] }
tracing-opentelemetry = "0.28"
