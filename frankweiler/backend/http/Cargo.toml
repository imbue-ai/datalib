[package]
name = "frankweiler-http"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
name = "frankweiler_http"
path = "src/lib.rs"

[[bin]]
name = "frankweiler-http"
path = "src/main.rs"

# The code also consumes frankweiler-ingest-config, which is bazel-only
# (no Cargo.toml) — this manifest feeds crate_universe's third-party
# resolution and does not cargo-compile. BUILD.bazel is the dep truth.
[dependencies]
app-schema = { path = "../app_schema" }
frankweiler-core = { path = "../core" }
frankweiler-qmd-indexer = { path = "../qmd_indexer" }
frankweiler-time = { path = "../time" }
clap = { version = "4.5", features = ["derive"] }
mime_guess = "2"
# `debug-embed` forces the proc macro to bake bytes into the binary
# even in debug builds. Without it, debug builds resolve files from
# disk at *runtime* using the compile-time absolute path — fine for
# `cargo run` in-tree, broken for a Bazel-built binary that runs
# outside the sandbox + for a shipped release tarball.
rust-embed = { version = "8", features = ["debug-embed", "interpolate-folder-path"] }
serde = { workspace = true }
webbrowser = "1"
serde_json = { workspace = true }
serde_yaml = { workspace = true }
sha2 = "0.10"
anyhow = { workspace = true }
axum = { workspace = true }
chrono = { workspace = true }
futures = "0.3"
tokio = { workspace = true }
tower-http = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
sqlx = { workspace = true }
tempfile = "3"
tower = { version = "0.5", features = ["util"] }
