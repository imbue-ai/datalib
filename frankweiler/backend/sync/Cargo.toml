[package]
name = "frankweiler-sync"
version.workspace = true
edition.workspace = true
publish.workspace = true

[[bin]]
name = "frankweiler-sync"
path = "src/main.rs"

[dependencies]
frankweiler-core = { path = "../core" }
frankweiler-etl = { path = "../etl" }
frankweiler-obs = { path = "../obs" }
frankweiler-qmd-indexer = { path = "../qmd_indexer" }
frankweiler-etl-anthropic = { path = "../etl/providers/anthropic" }
frankweiler-etl-beeper = { path = "../etl/providers/beeper" }
frankweiler-etl-chatgpt = { path = "../etl/providers/chatgpt" }
frankweiler-etl-contacts = { path = "../etl/providers/contacts" }
frankweiler-etl-slack = { path = "../etl/providers/slack" }
frankweiler-etl-github = { path = "../etl/providers/github" }
frankweiler-etl-gitlab = { path = "../etl/providers/gitlab" }
frankweiler-etl-notion = { path = "../etl/providers/notion" }
frankweiler-etl-perseus = { path = "../etl/providers/perseus" }
anyhow = { workspace = true }
clap = { version = "4.5", features = ["derive", "env"] }
indicatif = "0.18"
serde_json = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "signal", "sync"] }
sqlx = { workspace = true }
chrono = { workspace = true }
tracing = "0.1"

[dev-dependencies]
insta = { version = "1.41", features = ["json", "redactions"] }
tempfile = "3"
serde_yaml = { workspace = true }
walkdir = "2"
tokio = { workspace = true, features = ["rt", "macros"] }
sqlx = { workspace = true }
