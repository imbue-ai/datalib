# rust-embed's `interpolate-folder-path` in frankweiler-http's embed.rs
# resolves $FRANKWEILER_UI_DIST at proc-macro expansion time. Under
# Bazel the rust_library's rustc_env provides it; cargo builds of this
# shell get it from here. `relative = true` resolves against this
# directory's parent (frankweiler/tauri/), so the value points at
# frankweiler/ui/dist regardless of invocation cwd. The dist must exist
# before compiling — `tauri build`'s beforeBuildCommand builds it; for
# plain `cargo build`, run `pnpm --dir ../ui build` first.
[env]
FRANKWEILER_UI_DIST = { value = "../ui/dist", relative = true }

# Link the Bazel-built doltlite archive instead of libsqlite3-sys's
# bundled stock-SQLite amalgamation — same mechanism as the
# `crate.annotation` on libsqlite3-sys in MODULE.bazel (libsqlite3-sys
# gives SQLITE3_LIB_DIR precedence over bundling). Without this the
# shell cannot open real synced data roots: `frankweiler-sync` writes
# the index DB (`system/backend_index/db.doltlite_db`) in doltlite's
# own format ("CTLD" magic),
# which stock SQLite rejects with "file is not a database". Requires
# `bazelisk build //third-party/doltlite:sqlite3` first (the
# beforeBuildCommand in tauri.conf.json runs it; for plain `cargo
# build`, run it yourself). The bazel-bin symlink resolves per-checkout,
# so these relative values work from any clone location.
SQLITE3_INCLUDE_DIR = { value = "../../bazel-bin/third-party/doltlite", relative = true }
SQLITE3_LIB_DIR = { value = "../../bazel-bin/third-party/doltlite", relative = true }
SQLITE3_STATIC = "1"
# sqlx's `sqlite` feature turns on libsqlite3-sys's `bundled`, whose
# build path compiles the stock amalgamation unconditionally and never
# consults SQLITE3_LIB_DIR. This flag (misleadingly named) forces the
# `build_linked` path instead.
LIBSQLITE3_SYS_USE_PKG_CONFIG = "1"
# Even with SQLITE3_LIB_DIR set, build_linked probes pkg-config first
# and only falls back to the bare `static=sqlite3` + link-search pair
# when the probe FAILS. On hosts with a system/homebrew sqlite3.pc the
# probe succeeds and links Apple's stub — which lacks
# sqlite3_unlock_notify / sqlite3_load_extension and isn't doltlite.
# The pkg_config crate honors this kill switch, guaranteeing the
# fallback path.
SQLITE3_NO_PKG_CONFIG = "1"
